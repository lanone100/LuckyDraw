以下是修正Bug後的完整「轉盤抽籤」HTML文件。它解決了主題切換、轉盤繪製與觸控操作等問題，提供穩定且流暢的體驗。

```html
<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>轉盤抽籤 · 加權機率 (修復版)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ----- 設計變數 (預設深色) ----- */
:root {
  --bg: #000000;
  --bg2: #0a0a0a;
  --surface: #1c1c1e;
  --surface2: #2c2c2e;
  --surface3: #3a3a3c;
  --glass: rgba(28,28,30,0.85);
  --glass-b: rgba(255,255,255,0.10);
  --t1: #ffffff;
  --t2: rgba(235,235,245,0.60);
  --t3: rgba(235,235,245,0.30);
  --t4: rgba(235,235,245,0.16);
  --blue: #0A84FF;
  --indigo: #5E5CE6;
  --purple: #BF5AF2;
  --pink: #FF375F;
  --red: #FF453A;
  --orange: #FF9F0A;
  --yellow: #FFD60A;
  --green: #30D158;
  --teal: #40CBE0;
  --cyan: #64D2FF;
  --accent: var(--indigo);
  --accent-s: rgba(94,92,230,0.18);
  --accent-g: rgba(94,92,230,0.35);
  --sep: rgba(255,255,255,0.08);
  --r-s: 10px;
  --r-m: 14px;
  --r-l: 20px;
  --r-xl: 28px;
  --r-f: 999px;
  --shadow-card: 0 2px 16px rgba(0,0,0,0.40);
  --shadow-wheel: 0 12px 48px rgba(0,0,0,0.55);
}

/* ----- 淺色模式 ----- */
[data-theme="light"] {
  --bg: #f2f2f7;
  --bg2: #ffffff;
  --surface: #ffffff;
  --surface2: #f2f2f7;
  --surface3: #e5e5ea;
  --glass: rgba(255,255,255,0.90);
  --glass-b: rgba(0,0,0,0.08);
  --t1: #000000;
  --t2: rgba(60,60,67,0.60);
  --t3: rgba(60,60,67,0.30);
  --t4: rgba(60,60,67,0.12);
  --blue: #007AFF;
  --indigo: #5856D6;
  --purple: #AF52DE;
  --pink: #FF2D55;
  --red: #FF3B30;
  --orange: #FF9500;
  --yellow: #FFCC00;
  --green: #34C759;
  --teal: #30B0C7;
  --cyan: #32ADE6;
  --accent: var(--indigo);
  --accent-s: rgba(88,86,214,0.10);
  --accent-g: rgba(88,86,214,0.22);
  --sep: rgba(0,0,0,0.08);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.10);
  --shadow-wheel: 0 8px 32px rgba(0,0,0,0.18);
}

/* ----- 過渡效果 (修復: 避免與關鍵動畫衝突) ----- */
html.theme-transitioning *,
html.theme-transitioning *::after,
html.theme-transitioning *::before {
  transition: background-color 0.4s ease, border-color 0.4s ease,
              color 0.4s ease, box-shadow 0.4s ease, opacity 0.4s ease !important;
}
/* 確保 before 的動畫 (光暈) 不會被 !important 凍結 */
html.theme-transitioning .wheel-ring::before {
  animation: none !important;  /* 過渡時暫停光暈，避免卡頓 */
}

/* ----- reset & base ----- */
* {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; max-width: 100%; overflow-x: hidden; }
body {
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
  background: var(--bg); color: var(--t1);
  min-height: 100vh; min-height: 100dvh;
  transition: background 0.4s ease, color 0.4s ease;
}
.orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); z-index: 0; animation: orbDrift 20s ease-in-out infinite alternate; }
.orb-1 { width:440px; height:440px; background:var(--indigo); top:-130px; right:-110px; opacity:0.16; }
.orb-2 { width:320px; height:320px; background:var(--pink); bottom:40px; left:-90px; opacity:0.13; animation-delay:-7s; }
.orb-3 { width:220px; height:220px; background:var(--teal); top:42%; left:52%; opacity:0.10; animation-delay:-13s; }
[data-theme="light"] .orb-1 { opacity:0.08; }
[data-theme="light"] .orb-2 { opacity:0.07; }
[data-theme="light"] .orb-3 { opacity:0.06; }
@keyframes orbDrift { from{transform:translate(0,0) scale(1);} to{transform:translate(28px,18px) scale(1.07);} }

/* ----- 主要結構 (與原始幾乎相同，僅微調) ----- */
.app { position: relative; z-index: 1; width: 100%; max-width: 980px; margin: 0 auto; padding: 0 clamp(12px,4vw,20px); padding-top: max(env(safe-area-inset-top,0px), 0px); padding-bottom: env(safe-area-inset-bottom, 16px); }
.nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 13px clamp(12px,4vw,20px) 11px; position: sticky; top: 0; z-index: 100; background: var(--glass); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border-bottom: 1px solid var(--sep); margin-left: calc(-1 * clamp(12px,4vw,20px)); margin-right: calc(-1 * clamp(12px,4vw,20px)); transition: background 0.4s ease, border-color 0.4s ease; }
.nav-title-wrap { display:flex; flex-direction:column; }
.nav-title { font-size: clamp(19px,5vw,25px); font-weight:900; letter-spacing:-0.5px; background: linear-gradient(135deg, var(--t1) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.nav-sub { font-size:11px; color:var(--t3); margin-top:2px; letter-spacing:0.2px; }
.nav-actions { display:flex; gap:8px; align-items:center; }
.icon-btn { width:40px; height:40px; border-radius:var(--r-f); background: var(--surface2); border: 1px solid var(--glass-b); cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size:17px; transition: background 0.4s ease, border-color 0.4s ease, transform 0.15s, box-shadow 0.2s; }
.icon-btn:hover { background:var(--surface3); transform:scale(1.08); box-shadow:0 4px 14px var(--accent-g); }
.icon-btn:active { transform:scale(0.90); }
.t-icon { position: absolute; inset:0; display: flex; align-items:center; justify-content:center; font-size:17px; line-height:1; transition: opacity 0.38s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; }
.t-sun { opacity:1; transform:rotate(0deg) scale(1); }
.t-moon { opacity:0; transform:rotate(-90deg) scale(0.5); }
[data-theme="light"] .t-sun { opacity:0; transform:rotate(90deg) scale(0.5); }
[data-theme="light"] .t-moon { opacity:1; transform:rotate(0deg) scale(1); }

/* ----- 主網格 ----- */
.main-grid { display: grid; grid-template-columns: 1fr minmax(0,300px); gap: 20px; align-items: start; padding-top: 20px; padding-bottom: 40px; width: 100%; min-width: 0; }
@media (max-width:760px) { .main-grid { grid-template-columns:1fr; gap:16px; padding-top:16px; } }

/* ----- 轉盤欄 ----- */
.wheel-col { display: flex; flex-direction: column; align-items: center; gap: 24px; width: 100%; min-width: 0; padding: 16px 0 8px; }
.wheel-ring { position: relative; width: min(360px, calc(100vw - 72px)); height: min(360px, calc(100vw - 72px)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.wheel-ring::before { content:''; position:absolute; inset:-10px; border-radius:50%; background: conic-gradient(var(--indigo) 0deg, var(--pink) 72deg, var(--orange) 144deg, var(--teal) 216deg, var(--purple) 288deg, var(--indigo) 360deg); opacity:0.22; filter:blur(14px); animation: haloPulse 4s ease-in-out infinite; transition: opacity 0.4s ease; }
[data-theme="light"] .wheel-ring::before { opacity:0.14; }
@keyframes haloPulse { 0%,100%{opacity:0.18;transform:scale(1);} 50%{opacity:0.30;transform:scale(1.04);} }
canvas#wheel { display:block; width:100%; height:100%; border-radius:50%; box-shadow: 0 0 0 3px var(--surface2), 0 0 0 5px var(--glass-b), var(--shadow-wheel); cursor:pointer; position:relative; z-index:2; transition: transform 0.12s, box-shadow 0.4s ease; }
canvas#wheel:hover { transform:scale(1.012); }
canvas#wheel:active { transform:scale(0.988); }
.ptr { position:absolute; right:-6px; top:50%; transform:translateY(-50%); z-index:10; filter:drop-shadow(0 2px 8px rgba(255,214,10,0.65)); }
.ptr svg { width:32px; height:32px; }
.center-btn { position:absolute; z-index:11; width:64px; height:64px; border-radius:50%; background: linear-gradient(145deg, var(--accent) 0%, #8b80ff 100%); border: 3px solid var(--bg); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; box-shadow: 0 0 0 1px var(--glass-b), 0 6px 24px var(--accent-g), 0 2px 8px rgba(0,0,0,0.5); transition: transform 0.15s, box-shadow 0.15s, border-color 0.4s ease; user-select:none; }
.center-btn-lbl { font-size:13px; font-weight:800; color:#fff; letter-spacing:0.5px; }
.center-btn-icon { font-size:18px; line-height:1; }
.center-btn:hover { transform:scale(1.11); box-shadow:0 0 0 1px var(--glass-b), 0 10px 30px var(--accent-g); }
.center-btn:active { transform:scale(0.93); }
.center-btn.spinning { cursor:not-allowed; opacity:0.55; animation:cPulse 0.8s ease-in-out infinite; }
@keyframes cPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
.result-pill { width:100%; max-width:min(400px, calc(100vw - 32px)); background: var(--glass); border: 1px solid var(--glass-b); border-radius: var(--r-xl); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); padding:14px 18px; min-height:62px; display:flex; align-items:center; gap:12px; transition: border-color 0.3s, box-shadow 0.3s, background 0.4s ease; }
.result-pill.lit { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-s), 0 8px 32px var(--accent-g); }
.r-icon { width:36px; height:36px; border-radius:10px; background:var(--accent-s); border:1px solid var(--glass-b); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition: background 0.3s; }
.result-pill.lit .r-icon { background:var(--accent); }
.r-texts { flex:1; min-width:0; }
.r-meta { font-size:11px; color:var(--t3); font-weight:500; letter-spacing:0.3px; }
.r-name { font-size:18px; font-weight:800; color:var(--t1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition: color 0.3s; }
.r-name.idle { font-size:13px; font-weight:400; color:var(--t3); }
.spin-btn { width:100%; max-width:min(400px, calc(100vw - 32px)); height:52px; border-radius:var(--r-xl); background: linear-gradient(135deg, var(--accent) 0%, #9b8fff 100%); border:none; color:#fff; font-family:'Noto Sans TC',sans-serif; font-size:16px; font-weight:800; letter-spacing:0.5px; cursor:pointer; box-shadow: 0 4px 20px var(--accent-g); transition: opacity 0.2s, transform 0.12s, box-shadow 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
.spin-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px var(--accent-g); }
.spin-btn:active { transform:scale(0.97); }
.spin-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none; }

/* ----- 側邊欄卡片 (簡潔保留) ----- */
.side-col { display:flex; flex-direction:column; gap:14px; min-width:0; width:100%; }
.card { background: var(--glass); border: 1px solid var(--glass-b); border-radius: var(--r-l); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); overflow:hidden; width:100%; box-shadow: var(--shadow-card); transition: background 0.4s ease, border-color 0.4s ease; }
.card-hdr { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 10px; border-bottom:1px solid var(--sep); }
.card-ttl { font-size:12px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--t2); display:flex; align-items:center; gap:6px; }
.badge { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-s); border-radius:var(--r-f); padding:2px 8px; border:1px solid rgba(94,92,230,0.2); }
.item-list { list-style:none; max-height:210px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--surface3) transparent; }
.item-list::-webkit-scrollbar { width:3px; }
.item-list::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }
.item-row { display:flex; align-items:center; gap:10px; padding:9px 16px; border-bottom:1px solid var(--sep); }
.item-row:last-child { border-bottom:none; }
.item-row.used { opacity:0.30; }
.swatch { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.i-lbl { flex:1; font-size:14px; font-weight:500; color:var(--t1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.i-lbl.done::after { content:' ✓'; color:var(--green); font-size:11px; }
.w-chip { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--t3); background:var(--surface2); border:1px solid var(--glass-b); border-radius:6px; padding:2px 7px; min-width:26px; text-align:center; }
.del-btn { width:24px; height:24px; border-radius:50%; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--t3); font-size:15px; line-height:1; transition: background 0.15s, color 0.15s; }
.del-btn:hover { background:rgba(255,59,48,0.15); color:var(--red); }
.add-form { padding:10px 14px 12px; border-top:1px solid var(--sep); display:flex; flex-direction:column; gap:8px; }
.add-row { display:flex; gap:6px; flex-wrap:wrap; }
.field { flex:1; min-width:0; background:var(--surface2); border:1px solid var(--glass-b); border-radius:var(--r-s); color:var(--t1); font-family:'Noto Sans TC',sans-serif; font-size:14px; padding:9px 12px; outline:none; transition: border-color 0.2s, box-shadow 0.2s; }
.field:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-s); }
.field-sm { flex:0 0 52px; width:52px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:13px; }
.add-btn { flex:0 0 auto; height:40px; padding:0 14px; background:var(--accent); border:none; border-radius:var(--r-s); color:#fff; font-weight:700; cursor:pointer; transition: background 0.15s, transform 0.1s; }
.add-btn:hover { background:#7b78f0; }
.add-btn:active { transform:scale(0.95); }
.hint { font-size:11px; color:var(--t4); }
.set-list { padding:6px 0; }
.set-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 16px; min-width:0; }
.set-lbl { font-size:14px; color:var(--t1); }
.set-sub { font-size:11px; color:var(--t3); margin-top:1px; }
.tog { position:relative; width:50px; height:30px; flex-shrink:0; }
.tog input { opacity:0; width:0; height:0; position:absolute; }
.tog-track { position:absolute; inset:0; border-radius:30px; background:var(--surface3); cursor:pointer; transition: background 0.3s ease; }
.tog input:checked ~ .tog-track { background:var(--green); }
.tog-track::after { content:''; position:absolute; top:3px; left:3px; width:24px; height:24px; background:#fff; border-radius:50%; box-shadow:0 2px 6px rgba(0,0,0,0.25); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.tog input:checked ~ .tog-track::after { transform:translateX(20px); }
.stepper { display:flex; align-items:center; background:var(--surface2); border:1px solid var(--glass-b); border-radius:var(--r-s); overflow:hidden; }
.step-btn { width:30px; height:30px; border:none; background:none; color:var(--accent); font-size:18px; font-weight:600; cursor:pointer; }
.step-btn:hover { background:var(--accent-s); }
.step-val { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:var(--t1); min-width:28px; text-align:center; }
.hist-list { list-style:none; max-height:160px; overflow-y:auto; }
.hist-item { display:flex; align-items:center; gap:10px; padding:8px 16px; border-bottom:1px solid var(--sep); animation: slideIn 0.22s ease; }
@keyframes slideIn { from{opacity:0;transform:translateX(-10px);} to{opacity:1;transform:none;} }
.h-num { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--t4); min-width:20px; }
.h-dot { width:8px; height:8px; border-radius:3px; flex-shrink:0; }
.h-nm { font-size:13px; color:var(--t1); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.empty-st { padding:22px; text-align:center; font-size:13px; color:var(--t4); }
.empty-ic { font-size:28px; margin-bottom:6px; }
.txt-btn { background:none; border:none; cursor:pointer; font-size:12px; font-weight:600; color:var(--accent); padding:2px 4px; border-radius:4px; }
.txt-btn.danger { color:var(--red); }
.reset-row { padding:12px 14px; border-top:1px solid var(--sep); display:flex; gap:8px; }
.out-btn { flex:1; height:40px; border-radius:var(--r-s); background:none; border:1px solid var(--glass-b); color:var(--t2); font-size:13px; font-weight:500; cursor:pointer; transition: border-color 0.2s, color 0.2s; }
.out-btn:hover { border-color:var(--red); color:var(--red); background:rgba(255,59,48,0.06); }

/* ----- modal (與原始相同) ----- */
#cc { position:fixed; inset:0; pointer-events:none; z-index:9999; }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(8px) saturate(130%); -webkit-backdrop-filter:blur(8px) saturate(130%); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.28s; }
.modal-bg.open { opacity:1; pointer-events:all; }
.modal-sheet { background:var(--glass); border:1px solid var(--glass-b); border-radius:var(--r-xl); width:100%; max-width:360px; backdrop-filter:blur(40px) saturate(200%); -webkit-backdrop-filter:blur(40px) saturate(200%); box-shadow:0 32px 80px rgba(0,0,0,0.55); transform:scale(0.85) translateY(20px); overflow:hidden; transition: transform 0.36s cubic-bezier(0.34,1.46,0.64,1), background 0.4s ease, border-color 0.4s ease; }
.modal-bg.open .modal-sheet { transform:scale(1) translateY(0); }
.modal-hero { height:120px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:4px; position:relative; overflow:hidden; }
.m-hero-bg { position:absolute; inset:0; background: conic-gradient(from 200deg at 50% 120%, var(--indigo) 0deg, var(--pink) 90deg, var(--orange) 180deg, var(--teal) 270deg, var(--indigo) 360deg); }
[data-theme="light"] .m-hero-bg { opacity:0.82; }
.m-blur { position:absolute; inset:0; backdrop-filter:blur(2px); }
.m-trophy { font-size:44px; position:relative; z-index:1; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }
.m-congrats { position:relative; z-index:1; font-size:12px; font-weight:600; color:rgba(255,255,255,0.88); letter-spacing:1px; }
.modal-body { padding:24px 28px 20px; text-align:center; }
.m-lbl { font-size:12px; color:var(--t3); margin-bottom:6px; }
.m-name { font-size:clamp(26px,7vw,38px); font-weight:900; line-height:1.15; word-break:break-all; margin-bottom:24px; }
.modal-acts { display:flex; gap:10px; }
.m-btn { flex:1; height:46px; border-radius:var(--r-m); border:none; cursor:pointer; font-size:15px; font-weight:700; transition: opacity 0.15s, transform 0.12s, background 0.4s ease; }
.m-btn:active { transform:scale(0.96); }
.m-primary { background:var(--accent); color:#fff; }
.m-ghost { background:var(--surface2); color:var(--t2); }
.m-ghost:hover { background:var(--surface3); }

/* ----- 行動分頁 ----- */
.tab-bar { display:none; }
@media (max-width:760px) {
  .tab-bar { display:flex !important; position:fixed; bottom:0; left:0; right:0; height:calc(56px + env(safe-area-inset-bottom,0px)); padding-bottom:env(safe-area-inset-bottom,0px); background:var(--glass); border-top:1px solid var(--glass-b); backdrop-filter:blur(20px) saturate(180%); z-index:50; }
  .tab-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:none; background:none; color:var(--t3); cursor:pointer; }
  .tab-item.active { color:var(--accent); }
  .tab-ico { font-size:20px; }
  .tab-lbl { font-size:10px; font-weight:600; }
  .app { padding-bottom:calc(64px + env(safe-area-inset-bottom,0px)); }
  .side-col { display:none; }
  .side-col.m-on { display:flex; width:100%; }
  .wheel-wrap { display:none; }
  .wheel-wrap.m-on { display:flex; flex-direction:column; align-items:center; width:100%; }
}
@media (min-width:761px) { .wheel-wrap { display:flex; } .side-col { display:flex; } }

.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(12px); background:var(--surface); border:1px solid var(--glass-b); border-radius:var(--r-f); padding:10px 20px; font-size:13px; font-weight:600; color:var(--t1); box-shadow:0 8px 32px rgba(0,0,0,0.4); opacity:0; pointer-events:none; z-index:600; white-space:nowrap; transition: opacity 0.22s, transform 0.22s, background 0.4s ease; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<canvas id="cc"></canvas>

<!-- 結果 modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal-sheet">
    <div class="modal-hero"><div class="m-hero-bg"></div><div class="m-blur"></div><div class="m-trophy">🎉</div><div class="m-congrats">恭喜抽中！</div></div>
    <div class="modal-body"><div class="m-lbl">本次結果</div><div class="m-name" id="mName">—</div><div class="modal-acts"><button class="m-btn m-ghost" id="mAgain">再抽一次</button><button class="m-btn m-primary" id="mClose">確認</button></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<div class="app">
  <nav class="nav-bar"><div class="nav-title-wrap"><div class="nav-title">🎡 轉盤抽籤</div><div class="nav-sub">自訂選項 · 加權機率</div></div><div class="nav-actions"><button class="icon-btn" id="themeBtn"><span class="t-icon t-sun">☀️</span><span class="t-icon t-moon">🌙</span></button></div></nav>
  <div class="main-grid">
    <!-- 轉盤區塊 -->
    <div class="wheel-wrap m-on" id="panelWheel">
      <div class="wheel-col">
        <div class="wheel-ring"><canvas id="wheel" width="480" height="480"></canvas><div class="ptr"><svg viewBox="0 0 32 32"><polygon points="32,16 6,5 6,27" fill="#FFD60A" stroke="rgba(0,0,0,0.28)" stroke-width="1.5"/></svg></div><div class="center-btn" id="centerBtn"><span class="center-btn-icon">▶</span><span class="center-btn-lbl">轉！</span></div></div>
        <div class="result-pill" id="resultPill"><div class="r-icon" id="rIcon">🎲</div><div class="r-texts"><div class="r-meta">抽籤結果</div><div class="r-name idle" id="rName">點擊轉盤開始抽籤</div></div></div>
        <button class="spin-btn" id="spinBtn"><span>▶</span><span>開始旋轉</span></button>
      </div>
    </div>
    <!-- 側邊欄 -->
    <div class="side-col m-on" id="panelSide">
      <div class="card"><div class="card-hdr"><div class="card-ttl"><span>📋</span>選項清單</div><span class="badge" id="countBadge">0</span></div><ul class="item-list" id="itemList"></ul><div class="add-form"><div class="add-row"><input class="field" id="nameInput" placeholder="選項名稱" maxlength="18"><input class="field field-sm" id="weightInput" type="number" value="1" min="1" max="99"><button class="add-btn" id="addBtn">新增</button></div><div class="hint">🔢 右側數字為權重，越大越容易抽中</div></div></div>
      <div class="card"><div class="card-hdr"><div class="card-ttl"><span>⚙️</span>設定</div></div><div class="set-list"><div class="set-row"><div><div class="set-lbl">禁止重複抽取</div><div class="set-sub">已抽到的選項將從轉盤移除</div></div><label class="tog"><input type="checkbox" id="noRepeat"><span class="tog-track"></span></label></div><div class="set-row"><div><div class="set-lbl">彩花動畫</div><div class="set-sub">抽到結果時撒彩花</div></div><label class="tog"><input type="checkbox" id="confettiOn" checked><span class="tog-track"></span></label></div><div class="set-row"><div><div class="set-lbl">旋轉圈數</div><div class="set-sub">轉盤旋轉的圈數</div></div><div class="stepper"><button class="step-btn" id="decR">−</button><span class="step-val" id="roundsVal">5</span><button class="step-btn" id="incR">+</button></div></div></div></div>
      <div class="card"><div class="card-hdr"><div class="card-ttl"><span>📜</span>歷史記錄</div><button class="txt-btn danger" id="clearHist">清除</button></div><ul class="hist-list" id="histList"><li class="empty-st"><div class="empty-ic">🎲</div><div>尚無抽籤記錄</div></li></ul></div>
      <div class="card"><div class="reset-row"><button class="out-btn" id="resetBtn">↺ 重設所有選項</button></div></div>
    </div>
  </div>
</div>
<div class="tab-bar" id="tabBar"><button class="tab-item active" data-panel="wheel"><span class="tab-ico">🎡</span><span class="tab-lbl">轉盤</span></button><button class="tab-item" data-panel="spin"><span class="tab-ico">▶️</span><span class="tab-lbl">旋轉</span></button><button class="tab-item" data-panel="side"><span class="tab-ico">⚙️</span><span class="tab-lbl">設定</span></button></div>

<script>
(function() {
  'use strict';

  /* ----- 設定與狀態 ----- */
  const PALETTE = ['#5E5CE6','#FF375F','#30D158','#FF9F0A','#0A84FF','#BF5AF2','#40CBE0','#FF6340','#FFD60A','#64D2FF','#FF2D55','#34C759','#AF52DE','#FF9500','#5AC8FA'];
  let items = [], hist = [], spinning = false, angle = 0, rounds = 5;

  /* ----- DOM 元素 ----- */
  const cv = document.getElementById('wheel'), cx = cv.getContext('2d');
  const SZ = 480, MX = 240, MY = 240, R = 230;
  const spinBtn = document.getElementById('spinBtn');
  const centerBtn = document.getElementById('centerBtn');
  const rName = document.getElementById('rName');
  const rIcon = document.getElementById('rIcon');
  const resultPill = document.getElementById('resultPill');
  const modalBg = document.getElementById('modalBg');
  const mName = document.getElementById('mName');
  const noRepeatChk = document.getElementById('noRepeat');
  const confettiChk = document.getElementById('confettiOn');
  const roundsVal = document.getElementById('roundsVal');
  const toastEl = document.getElementById('toast');
  const root = document.documentElement;

  // 輔助函數：目前可用的選項 (未移除)
  function activeItems() {
    return noRepeatChk.checked ? items.filter(i => !i.rm) : items.slice();
  }

  /* ----- 繪製轉盤 (核心) ----- */
  function drawWheel(a = angle) {
    const segs = activeItems();
    cx.clearRect(0, 0, SZ, SZ);

    if (segs.length === 0) {
      const g = cx.createRadialGradient(MX, MY, 0, MX, MY, R);
      g.addColorStop(0, 'rgba(94,92,230,0.09)'); g.addColorStop(1, 'rgba(94,92,230,0.02)');
      cx.beginPath(); cx.arc(MX, MY, R, 0, 2*Math.PI); cx.fillStyle = g; cx.fill();
      cx.strokeStyle = 'rgba(94,92,230,0.2)'; cx.lineWidth = 2; cx.stroke();
      cx.fillStyle = 'rgba(235,235,245,0.30)';
      cx.font = 'bold 15px Noto Sans TC'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.fillText('請新增選項', MX, MY);
      drawCenter(); return;
    }

    const total = segs.reduce((acc, i) => acc + i.w, 0);
    let start = a;

    segs.forEach(seg => {
      const sweep = (seg.w / total) * 2 * Math.PI;
      const end = start + sweep;
      // 扇形
      cx.beginPath(); cx.moveTo(MX, MY); cx.arc(MX, MY, R, start, end); cx.closePath();
      const mid = start + sweep / 2;
      const gx = MX + Math.cos(mid) * R * 0.5, gy = MY + Math.sin(mid) * R * 0.5;
      const grad = cx.createRadialGradient(gx, gy, 0, gx, gy, R * 0.9);
      grad.addColorStop(0, lighten(seg.c, 22)); grad.addColorStop(1, seg.c);
      cx.fillStyle = grad; cx.fill();
      cx.strokeStyle = 'rgba(0,0,0,0.22)'; cx.lineWidth = 2; cx.stroke();

      // 文字
      const textRadius = R * 0.64;
      const tx = MX + Math.cos(mid) * textRadius, ty = MY + Math.sin(mid) * textRadius;
      cx.save(); cx.translate(tx, ty); cx.rotate(mid + Math.PI/2);
      const maxLen = Math.max(2, Math.floor(sweep * R * 0.5 / 10));
      const label = seg.n.length > maxLen ? seg.n.slice(0, maxLen) + '…' : seg.n;
      const fontSize = Math.max(10, Math.min(16, Math.floor(sweep * 68)));
      cx.font = `bold ${fontSize}px Noto Sans TC`;
      cx.textAlign = 'center'; cx.textBaseline = 'middle';
      cx.shadowColor = 'rgba(0,0,0,0.55)'; cx.shadowBlur = 4;
      cx.fillStyle = isLight(seg.c) ? '#111' : '#fff';
      cx.fillText(label, 0, 0); cx.restore();

      // 權重標記
      if (seg.w > 1) {
        const dotR = R * 0.86;
        const dx = MX + Math.cos(mid) * dotR, dy = MY + Math.sin(mid) * dotR;
        cx.beginPath(); cx.arc(dx, dy, 5, 0, 2*Math.PI);
        cx.fillStyle = 'rgba(255,255,255,0.45)'; cx.fill();
      }
      start = end;
    });
    drawCenter();
  }

  function drawCenter() {
    cx.beginPath(); cx.arc(MX, MY, 34, 0, 2*Math.PI); cx.fillStyle = '#000'; cx.fill();
    const hg = cx.createRadialGradient(MX, MY, 0, MX, MY, 30);
    hg.addColorStop(0, '#2d2b5a'); hg.addColorStop(1, '#1a1a2e');
    cx.beginPath(); cx.arc(MX, MY, 30, 0, 2*Math.PI);
    cx.fillStyle = hg; cx.fill();
    cx.strokeStyle = 'rgba(94,92,230,0.42)'; cx.lineWidth = 2; cx.stroke();
  }

  function lighten(h, p) {
    let r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
    return `rgb(${Math.min(255,r+p)},${Math.min(255,g+p)},${Math.min(255,b+p)})`;
  }
  function isLight(h) {
    let r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
    return (r*299 + g*587 + b*114)/1000 > 145;
  }

  /* ----- 旋轉邏輯 (修正: 角度飄移 & 邊界條件) ----- */
  function spin() {
    const segs = activeItems();
    if (segs.length < 2) { toast(segs.length === 0 ? '❗ 請新增至少 2 個選項' : '❗ 至少需要 2 個選項'); return; }
    if (spinning) return;
    spinning = true;

    spinBtn.disabled = true;
    centerBtn.classList.add('spinning');
    rName.className = 'r-name idle'; rName.textContent = '旋轉中…';
    resultPill.classList.remove('lit');
    rIcon.textContent = '🎲';

    // 隨機選取贏家 (加權)
    const total = segs.reduce((acc, i) => acc + i.w, 0);
    let rand = Math.random() * total, cum = 0, winner = segs[0];
    for (const s of segs) { cum += s.w; if (rand < cum) { winner = s; break; } }

    // 計算目標角度 (讓 winner 大致指向箭頭)
    let startSum = 0;
    for (const s of segs) { if (s === winner) break; startSum += s.w / total * 2 * Math.PI; }
    const winnerMid = startSum + (winner.w / total) * Math.PI;
    const jitter = (Math.random() - 0.5) * (winner.w / total) * Math.PI * 1.4;
    // target = -winnerMid + jitter + 額外圈數
    const target = -winnerMid + jitter + rounds * 2 * Math.PI;
    const startAngle = angle;
    const duration = 3000 + Math.random() * 1400;
    const startTime = performance.now();

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function animate(now) {
      const elapsed = now - startTime;
      let t = Math.min(elapsed / duration, 1);
      angle = startAngle + target * easeOutCubic(t);
      drawWheel(angle);
      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        // 正規化角度，避免浮點數誤差累積
        angle = ((angle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
        spinning = false;
        spinBtn.disabled = false;
        centerBtn.classList.remove('spinning');

        if (noRepeatChk.checked) winner.rm = true;  // 標記已抽
        showResult(winner);
        pushHistory(winner);
        renderList();
        drawWheel(angle);
      }
    }
    requestAnimationFrame(animate);
  }

  /* ----- 顯示結果 & modal ----- */
  function showResult(item) {
    rName.className = 'r-name'; rName.textContent = item.n; rName.style.color = item.c;
    resultPill.classList.add('lit');
    rIcon.textContent = '🎯'; rIcon.style.background = item.c + '33';

    mName.textContent = item.n; mName.style.color = item.c;
    modalBg.classList.add('open');
    if (confettiChk.checked) confetti(item.c);
  }

  document.getElementById('mClose').onclick = () => modalBg.classList.remove('open');
  document.getElementById('mAgain').onclick = () => { modalBg.classList.remove('open'); setTimeout(spin, 200); };
  modalBg.addEventListener('click', (e) => { if (e.target === modalBg) modalBg.classList.remove('open'); });

  /* ----- 歷史記錄 ----- */
  function pushHistory(item) {
    hist.unshift({ n: item.n, c: item.c });
    if (hist.length > 60) hist.pop();
    renderHist();
  }
  function renderHist() {
    const ul = document.getElementById('histList');
    if (hist.length === 0) { ul.innerHTML = '<li class="empty-st"><div class="empty-ic">🎲</div><div>尚無抽籤記錄</div></li>'; return; }
    ul.innerHTML = hist.map((h,i) => `<li class="hist-item"><span class="h-num">#${i+1}</span><span class="h-dot" style="background:${h.c}"></span><span class="h-nm">${h.n}</span></li>`).join('');
  }
  document.getElementById('clearHist').onclick = () => { hist = []; items.forEach(i => i.rm = false); renderHist(); renderList(); drawWheel(angle); toast('✅ 記錄已清除'); };

  /* ----- 選項操作 ----- */
  function addItem(name, weight, redraw = true) {
    if (!name.trim()) return;
    items.push({ n: name.trim(), w: Math.max(1, parseInt(weight) || 1), c: PALETTE[items.length % PALETTE.length], rm: false });
    if (redraw) { renderList(); drawWheel(angle); }
  }
  function renderList() {
    const segs = activeItems();
    document.getElementById('countBadge').textContent = segs.length;
    const ul = document.getElementById('itemList');
    if (items.length === 0) { ul.innerHTML = '<li class="empty-st"><div class="empty-ic">📝</div><div>尚無選項，請新增</div></li>'; return; }
    ul.innerHTML = items.map((it, idx) => `<li class="item-row${it.rm ? ' used' : ''}"><span class="swatch" style="background:${it.c}"></span><span class="i-lbl${it.rm ? ' done' : ''}">${it.n}</span><span class="w-chip">${it.w}</span><button class="del-btn" data-i="${idx}">×</button></li>`).join('');
    ul.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', (e) => {
      const i = parseInt(e.target.dataset.i);
      items.splice(i, 1);
      renderList(); drawWheel(angle);
    }));
  }

  document.getElementById('addBtn').onclick = () => {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { document.getElementById('nameInput').focus(); return; }
    if (items.length >= 50) { toast('❗ 最多 50 個選項'); return; }
    addItem(name, document.getElementById('weightInput').value);
    document.getElementById('nameInput').value = '';
    document.getElementById('weightInput').value = '1';
    document.getElementById('nameInput').focus();
  };
  document.getElementById('nameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('addBtn').click(); });

  // 圈數 stepper
  document.getElementById('incR').onclick = () => { rounds = Math.min(20, rounds + 1); roundsVal.textContent = rounds; };
  document.getElementById('decR').onclick = () => { rounds = Math.max(2, rounds - 1); roundsVal.textContent = rounds; };

  // 監聽禁止重複切換 → 重繪
  noRepeatChk.addEventListener('change', () => { renderList(); drawWheel(angle); });

  // 旋轉觸發
  spinBtn.addEventListener('click', spin);
  centerBtn.addEventListener('click', spin);
  cv.addEventListener('click', spin);

  // 重設
  document.getElementById('resetBtn').onclick = () => {
    if (!confirm('確定要清除所有選項嗎？')) return;
    items = []; hist = []; angle = 0;
    renderList(); renderHist(); drawWheel(0);
    rName.className = 'r-name idle'; rName.textContent = '點擊轉盤開始抽籤'; rName.style.color = '';
    resultPill.classList.remove('lit'); rIcon.textContent = '🎲'; rIcon.style.background = '';
    toast('✅ 已重設');
  };

  /* ----- 主題切換 (修正: 避免與動畫衝突) ----- */
  function applyTheme(theme, animate = true) {
    if (animate) {
      root.classList.add('theme-transitioning');
      setTimeout(() => root.classList.remove('theme-transitioning'), 480);
    }
    root.setAttribute('data-theme', theme);
    try { localStorage.setItem('spin-theme', theme); } catch (e) {}
    drawWheel(angle);  // 重繪以更新中心裝飾顏色
  }
  document.getElementById('themeBtn').onclick = () => {
    const dark = root.getAttribute('data-theme') === 'dark';
    applyTheme(dark ? 'light' : 'dark', true);
    toast(dark ? '☀️ 已切換淺色模式' : '🌙 已切換深色模式');
  };
  // 初始化主題
  (function initTheme() {
    let saved = null;
    try { saved = localStorage.getItem('spin-theme'); } catch(e) {}
    if (saved === 'light' || saved === 'dark') { applyTheme(saved, false); }
    else if (window.matchMedia && window.matchMedia('(prefers-color-scheme:light)').matches) { applyTheme('light', false); }
    else { applyTheme('dark', false); }
    // 監聽系統變化 (僅當未手動儲存時)
    window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', e => {
      let s = null; try { s = localStorage.getItem('spin-theme'); } catch (x) {}
      if (!s) applyTheme(e.matches ? 'dark' : 'light', true);
    });
  })();

  /* ----- 行動分頁 ----- */
  document.querySelectorAll('.tab-item').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const p = tab.dataset.panel;
      const pw = document.getElementById('panelWheel'), ps = document.getElementById('panelSide');
      if (p === 'spin') { pw.classList.add('m-on'); ps.classList.remove('m-on'); spin(); }
      else if (p === 'wheel') { pw.classList.add('m-on'); ps.classList.remove('m-on'); }
      else { ps.classList.add('m-on'); pw.classList.remove('m-on'); }
    });
  });

  /* ----- 輕提示 ----- */
  let tTimer = null;
  function toast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); clearTimeout(tTimer); tTimer = setTimeout(() => toastEl.classList.remove('show'), 2200); }

  /* ----- 彩炮 (優化效能) ----- */
  const ccCanvas = document.getElementById('cc'), cctx = ccCanvas.getContext('2d');
  let particles = [];
  function resizeCC() { ccCanvas.width = window.innerWidth; ccCanvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCC); resizeCC();

  function confetti(color) {
    const colors = [color, '#FFD60A', '#fff', '#5E5CE6', '#FF375F', '#30D158', '#40CBE0'];
    for (let i = 0; i < 140; i++) {
      particles.push({
        x: Math.random() * ccCanvas.width,
        y: ccCanvas.height * 0.3 + Math.random() * 80,
        vx: (Math.random() - 0.5) * 9,
        vy: -7 - Math.random() * 9,
        w: 3 + Math.random() * 8,
        h: 2 + Math.random() * 5,
        c: colors[Math.floor(Math.random() * colors.length)],
        r: Math.random() * 2 * Math.PI,
        rv: (Math.random() - 0.5) * 0.18,
        life: 1
      });
    }
    if (!window._animCC) { window._animCC = requestAnimationFrame(animateCC); }
  }
  function animateCC() {
    cctx.clearRect(0, 0, ccCanvas.width, ccCanvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.28; p.r += p.rv; p.life -= 0.012;
      cctx.save(); cctx.translate(p.x, p.y); cctx.rotate(p.r);
      cctx.globalAlpha = p.life; cctx.fillStyle = p.c;
      cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); cctx.restore();
    });
    if (particles.length > 0) { window._animCC = requestAnimationFrame(animateCC); }
    else { cctx.clearRect(0,0,ccCanvas.width,ccCanvas.height); window._animCC = null; }
  }

  /* ----- 初始化預設選項 (修正: 避免重複push) ----- */
  const defaults = [['選項一',1],['選項二',1],['選項三',2],['選項四',1],['選項五',1],['選項六',3]];
  defaults.forEach(([n,w]) => addItem(n, w, false));
  renderList(); renderHist(); drawWheel(0);
})();
</script>
</body>
</html>
