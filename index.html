<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機轉盤隨機抽獎</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
        }
        /* 轉盤區域 */
        .wheel-section {
            position: relative;
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #canvas-container {
            position: relative;
            margin-top: 20px;
        }
        #wheel-canvas {
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }
        /* 指針 */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }
        /* 控制面板 */
        .input-section {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-spin { background-color: #2ecc71; color: white; }
        .btn-spin:disabled { background-color: #bdc3c7; }
        .btn-reset { background-color: #3498db; color: white; }
        
        /* 結果彈窗 */
        #result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 100;
            text-align: center;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 90;
        }
    </style>
</head>
<body>

    <h1>🎡 隨機大轉盤</h1>

    <div class="container">
        <div class="wheel-section">
            <div id="canvas-container">
                <div class="pointer"></div>
                <canvas id="wheel-canvas" width="400" height="400"></canvas>
            </div>
            <div class="btn-group" style="width: 100%; margin-top: 20px;">
                <button class="btn-spin" id="spin-btn">開始旋轉！</button>
            </div>
        </div>

        <div class="input-section">
            <h3>設定選項 (一行一個)</h3>
            <textarea id="items-input">選項 A
選項 B
選項 C
選項 D
選項 E
選項 F</textarea>
            <p><small>* 提示：重複輸入相同項目可增加其權重。</small></p>
            <div class="btn-group">
                <button class="btn-reset" id="update-btn">更新轉盤</button>
            </div>
        </div>
    </div>

    <div id="overlay"></div>
    <div id="result-modal">
        <h2 style="margin-top:0">恭喜中獎！</h2>
        <h1 id="winner-text" style="color: #e67e22;"></h1>
        <div class="btn-group">
            <button onclick="closeModal()">繼續</button>
            <button onclick="removeWinner()" style="background:#e74c3c; color:white;">刪除此項並繼續</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const itemsInput = document.getElementById('items-input');
        const spinBtn = document.getElementById('spin-btn');
        const updateBtn = document.getElementById('update-btn');
        const winnerText = document.getElementById('winner-text');
        const modal = document.getElementById('result-modal');
        const overlay = document.getElementById('overlay');

        let items = [];
        let currentRotation = 0;
        let isSpinning = false;
        let lastWinnerIndex = -1;

        const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8bc34a', '#f44336'];

        function drawWheel() {
            const lines = itemsInput.value.split('\n').filter(line => line.trim() !== "");
            items = lines;
            
            const numSegments = items.length;
            const anglePerSegment = (Math.PI * 2) / numSegments;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) return;

            items.forEach((item, i) => {
                const angle = i * anglePerSegment;
                
                // 畫扇形
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, angle, angle + anglePerSegment);
                ctx.lineTo(200, 200);
                ctx.fill();
                ctx.stroke();

                // 畫文字
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(angle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px sans-serif";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 4;
                ctx.fillText(item, 180, 10);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning || items.length === 0) return;

            isSpinning = true;
            spinBtn.disabled = true;

            // 隨機旋轉圈數 (5-10圈) + 隨機角度
            const extraDegree = Math.floor(Math.random() * 360);
            const totalRotation = currentRotation + (360 * 8) + extraDegree;
            
            canvas.style.transform = `rotate(${totalRotation}deg)`;
            currentRotation = totalRotation;

            // 計算結果 (由於轉盤旋轉是順時針，指針在正上方，計算邏輯需扣掉旋轉位移)
            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                
                // 計算指向哪個索引
                const actualDegree = (360 - (totalRotation % 360)) % 360;
                // 轉盤繪製起點是 3 點鐘方向，指針在 12 點鐘，所以要偏轉 90 度補償
                const correctedDegree = (actualDegree + 270) % 360;
                const index = Math.floor((correctedDegree / 360) * items.length);
                
                lastWinnerIndex = index;
                showWinner(items[index]);
            }, 5000); // 對應 CSS 的 5s
        }

        function showWinner(name) {
            winnerText.innerText = name;
            modal.style.display = 'block';
            overlay.style.display = 'block';
        }

        function closeModal() {
            modal.style.display = 'none';
            overlay.style.display = 'none';
        }

        function removeWinner() {
            if (lastWinnerIndex > -1) {
                const lines = itemsInput.value.split('\n').filter(line => line.trim() !== "");
                lines.splice(lastWinnerIndex, 1);
                itemsInput.value = lines.join('\n');
                drawWheel();
                closeModal();
            }
        }

        updateBtn.addEventListener('click', () => {
            currentRotation = 0;
            canvas.style.transition = 'none';
            canvas.style.transform = `rotate(0deg)`;
            setTimeout(() => {
                canvas.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                drawWheel();
            }, 50);
        });

        spinBtn.addEventListener('click', spin);

        // 初始化繪製
        drawWheel();
    </script>
</body>
</html>
